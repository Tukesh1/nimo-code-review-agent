name: 'AI Code Review Agent'
description: 'Enterprise AI Code Reviewer using Gemini, OpenAI, or Claude'
inputs:
  github_token:
    description: 'GitHub token for posting comments'
    required: true
    default: ${{ github.token }}
  ai_provider:
    description: 'Which AI to use (gemini, openai, claude)'
    required: false
    default: 'gemini'
  ai_model:
    description: 'Specific model to use (e.g., gemini-1.5-flash, gpt-4o-mini)'
    required: false
  gemini_api_key:
    description: 'API key for Google Gemini'
    required: false
  openai_api_key:
    description: 'API key for OpenAI'
    required: false
  claude_api_key:
    description: 'API key for Anthropic Claude'
    required: false
runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    GITHUB_TOKEN: ${{ inputs.github_token }}
    AI_PROVIDER: ${{ inputs.ai_provider }}
    AI_MODEL: ${{ inputs.ai_model }}
    GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
    OPENAI_API_KEY: ${{ inputs.openai_api_key }}
    CLAUDE_API_KEY: ${{ inputs.claude_api_key }}