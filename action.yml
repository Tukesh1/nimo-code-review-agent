name: 'Nimo Code Review Agent'
description: 'Nimo Enterprise AI Code Reviewer using Gemini, OpenAI, or Claude'
inputs:
  github_token:
    description: 'GitHub token for posting comments'
    required: true
    default: ${{ github.token }}
  ai_provider:
    description: 'Which AI to use (gemini, openai, claude, openrouter)'
    required: false
    default: 'gemini'
  ai_model:
    description: 'Specific model to use (e.g., gemini-1.5-flash, gpt-4o-mini)'
    required: false
  custom_prompt:
    description: 'Additional instructions to pass to the AI model'
    required: false
  custom_prompt_file:
    description: 'Path to a file in your repository containing custom AI instructions (e.g. prompts/rules.txt)'
    required: false
  gemini_api_key:
    description: 'API key for Google Gemini'
    required: false
  openai_api_key:
    description: 'API key for OpenAI'
    required: false
  claude_api_key:
    description: 'API key for Anthropic Claude'
    required: false
  openrouter_api_key:
    description: 'API key for OpenRouter'
    required: false
runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    GITHUB_TOKEN: ${{ inputs.github_token }}
    AI_PROVIDER: ${{ inputs.ai_provider }}
    AI_MODEL: ${{ inputs.ai_model }}
    CUSTOM_PROMPT: ${{ inputs.custom_prompt }}
    CUSTOM_PROMPT_FILE: ${{ inputs.custom_prompt_file }}
    GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
    OPENAI_API_KEY: ${{ inputs.openai_api_key }}
    CLAUDE_API_KEY: ${{ inputs.claude_api_key }}
    OPENROUTER_API_KEY: ${{ inputs.openrouter_api_key }}